# Poor Paul's Benchmark — Qualitative Suite Starter
#
# Use this file to run the qualitative phases only (no re-running quantitative tests):
#   uv run ppb.py qualitative suites/qualitative_example.toml
#
# Or run everything together:
#   uv run ppb.py all suites/qualitative_example.toml
#
# Copy and rename this file for your own GPU — everything in suites/ except
# example files is gitignored.
#
# IMPORTANT: The qualitative phase requires llama-cpp-python with GPU support.
# Install it before running:
#   CUDA (Linux/Windows):
#     CMAKE_ARGS="-DGGML_CUDA=on" pip install "llama-cpp-python>=0.3.0"
#   Metal (macOS Apple Silicon):
#     CMAKE_ARGS="-DGGML_METAL=on" pip install "llama-cpp-python>=0.3.0"
#   Or via uv with a pre-built CUDA 12.4 wheel:
#     uv pip install llama-cpp-python \
#       --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cu124
#   Or use the optional dependency group (compiles from source):
#     uv pip install -e ".[qualitative]"
#   This installs llama-cpp-python (requires GPU build flags — see above).
#   The HuggingFace Hub client (huggingface_hub) is already installed as a
#   core PPB dependency and handles BFCL file downloads automatically.


# ── Model (required) ─────────────────────────────────────────────────────────
# The same model is used for both quantitative and qualitative phases.
# Change these to your target model.
repo_id    = "unsloth/Qwen3.5-0.8B-GGUF"
filename   = "Qwen3.5-0.8B-Q4_K_M.gguf"
models_dir = "./models"


# ── Quantitative phases (used by `ppb all` and `ppb quantitative`) ───────────
# Omit these sections if running `ppb qualitative` only.

[vram-cliff]
# min_ctx   = 2048
# max_ctx   = 131072
# tolerance = 1024

[sweep]
n_ctx    = [4096, 8192, 16384]
n_batch  = [512]


# ── Qualitative phases (used by `ppb all` and `ppb qualitative`) ─────────────

[qualitative]

# -- Context-Rot (Semantic Needle-in-a-Haystack) ----------------------------
# Measures how answer accuracy degrades as context length increases.
# 6 lengths × 5 depths = 30 test cases per model.
# Set context_rot_enabled = true to activate this phase.
context_rot_enabled = true

# haystack_lengths: token counts at which to test. Lengths exceeding the
# measured VRAM cliff (from a prior quantitative run or the current run's
# vram-cliff phase) are automatically skipped.
# Default: [4096, 8192, 16384, 32768, 65536, 131072]
# haystack_lengths = [4096, 8192, 16384, 32768, 65536, 131072]

# depths_pct: where in the haystack the needle is inserted (% of total tokens).
# Default: [10, 30, 50, 70, 90]
# depths_pct = [10, 30, 50, 70, 90]

# Needle configuration — the synthetic fact injected into the haystack.
# Override these to create your own needle. The answer must be an exact
# substring of needle_text for scoring to work correctly.
# needle_text   = "The secret launch code for Project Nightingale is ALPHA-7-DELTA."
# needle_query  = "Based only on the text provided, what is the secret launch code for Project Nightingale? Answer with just the code."
# needle_answer = "ALPHA-7-DELTA"

# GPU offload layers. -1 offloads all layers (recommended).
# n_gpu_layers = -1


# -- Tool-Call Accuracy (BFCL + PPB-native) ---------------------------------
# Measures whether the model produces structurally valid, schema-correct
# tool calls.  Uses the Berkeley Function Calling Leaderboard (BFCL) plus
# a PPB-native MCP ground-truth set covering the four ppb-mcp tools.
# Set tool_accuracy_enabled = true to activate this phase.
# BFCL files are downloaded automatically via huggingface_hub on first run
# and cached locally. No extra dependencies required beyond the core install.
tool_accuracy_enabled = true

# Number of BFCL cases to sample (PPB-native cases always run in addition).
# Default: 100  (→ 100 BFCL + 20 PPB-native = 120 total cases)
# tool_accuracy_sample_size = 100

# Context window used when loading the model for tool-accuracy. The default
# (4096) is plenty for BFCL-style single-turn function calls.
# tool_accuracy_n_ctx = 4096


# -- Answer Faithfulness & Quality (judge-model pipeline) -------------------
# Scores model answers on Faithfulness, Answer Relevancy, and Coherence.
# Uses a TWO-MODEL pipeline: the model under test (the "generator") plus a
# separate, smaller local "judge" model that grades the responses.  The
# generator and judge MUST be different models — the judge cannot grade
# itself.  50 single-turn factual questions are sampled once from
# anon8231489123/ShareGPT_Vicuna_unfiltered and cached in
# `ppb_quality_prompts_cache.json` so every model in the leaderboard is
# graded on identical prompts.
#
# Set answer_quality_enabled = true to activate this phase.
# answer_quality_enabled = false

# Path to the judge GGUF.  REQUIRED when answer_quality_enabled = true.
# Recommendation: a small, well-aligned model in the 3–7B range.
# judge_model_path = "./models/Qwen3.5-4B-Q4_K_M.gguf"

# Number of evaluation prompts.  Default: 50.  Lower this only for smoke
# tests — leaderboard rows should keep the default so they remain
# directly comparable.
# answer_quality_sample_size = 50

# Context windows for the generator and judge respectively.  Defaults: 4096.
# answer_quality_n_ctx = 4096
# answer_quality_judge_n_ctx = 4096


# -- Multi-Turn Conversational Memory & Coherence (Phase 7) -----------------
# Two evaluation modes:
#
#   * longmemeval_s (default) — uses the longmemeval_s split of
#     xiaowu0162/longmemeval-cleaned.  Each case has a long multi-turn
#     session_history followed by a follow-up question whose ground-truth
#     answer is recorded.  Cases whose rendered prompt exceeds the model's
#     measured VRAM cliff (looked up from the latest published
#     quantitative row, or from this run's vram-cliff phase) are skipped
#     and counted under cases_skipped_context.
#
#   * quick — runs the 80 two-turn questions from
#     lmsys/mt_bench_human_judgments.  Required: judge_model_path.  The
#     judge rates each final response on a 1–10 scale; the mean is
#     published as mt_bench_score.
#
# Set multiturn_enabled = true to activate this phase.
# multiturn_enabled = false

# Mode: "longmemeval_s" or "quick".  Default: "longmemeval_s".
# multiturn_mode = "longmemeval_s"

# Cap on the number of LongMemEval cases evaluated (ignored in quick
# mode where the 80 MT-Bench questions are fixed).  Default: 50.
# multiturn_sample_size = 50

# Context window used to load the generator for multi-turn evaluation.
# IMPORTANT: LongMemEval session histories are 50K–115K tokens. If this is
# set below the session history length, cases will be skipped as VRAM-cliff
# violations. Recommended: set to your measured vram_cliff_tokens, or omit
# and run `ppb quantitative` first so the orchestrator can look it up.
# Default when no VRAM cliff is known: 8192 (most LongMemEval cases will skip).
# multiturn_n_ctx = 32768

# Judge context window / GPU offload (judge is reused from
# answer_quality when both phases run together in `ppb all`).
# multiturn_judge_n_ctx = 4096
# multiturn_judge_n_gpu_layers = -1

# judge_model_path is inherited from the answer_quality block above when
# both phases are configured.  Set it here only if you want to use a
# DIFFERENT judge for multiturn than for answer_quality.
# judge_model_path = "./models/Qwen3.5-4B-Q4_K_M.gguf"


# ── Publishing (optional) ─────────────────────────────────────────────────────
# Uncomment to publish results to the PPB leaderboard after each model.
# [publish]
# submitter = "Your Name or GitHub handle"
# upload    = true   # set false to write CSV only without uploading
