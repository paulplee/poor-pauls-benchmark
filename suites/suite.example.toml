# Poor Paul's Benchmark — example benchmark suite
#
# A single TOML file drives vram-cliff, sweep, or both (via `ppb all`).
#
# Copy this file to create your own suite:
#
#   cp suites/suite.example.toml suites/my_gpu.toml
#
# Everything in suites/ except this example is gitignored, so you can
# name your files however you like without polluting version control.
#
# Usage:
#   uv run ppb.py sweep  suites/my_gpu.toml                   # sweep only (TOML)
#   uv run ppb.py sweep  --repo-id org/repo --filename '*.gguf' \
#                         --n-ctx 8192 --n-batch 512            # sweep (pure CLI)
#   uv run ppb.py vram-cliff suites/my_gpu.toml              # vram-cliff only
#   uv run ppb.py all    suites/my_gpu.toml                    # vram-cliff → sweep
#   uv run ppb.py all    suites/my_gpu.toml --results r.jsonl  # override output
#
# Incremental publish & auto-resume:
#   When using `ppb all` with a [publish] section, results are published
#   to Hugging Face after *each model* completes — not at the very end.
#   This protects you from losing days of work if the run fails late.
#
#   If a run is interrupted, just re-run the same command:
#     uv run ppb.py all suites/my_gpu.toml
#   PPB detects the existing results file, skips models that are already
#   fully benchmarked, and resumes from where it left off.


# ===================================================================
# Shared parameters
# ===================================================================
#
# Keys declared at the top level are inherited by BOTH [vram-cliff]
# and [sweep].  This means you set your model and runner ONCE.
# If you want to benchmark a different model, create a separate
# suite file — one model per suite keeps results tidy.
#
# A section can still override any shared key if needed.
# ===================================================================

# -------------------------------------------------------------------
# repo_id (required)
#   Hugging Face repository ID for the GGUF model.
#
# filename (required)
#   GGUF filename or glob pattern matched against the repo.
#
# models_dir (optional — default: "./models")
#   Local directory where downloaded models are stored.
#
#   Examples:
#     repo_id    = "unsloth/Qwen3.5-0.8B-GGUF"
#     filename   = "Qwen3.5-0.8B-IQ4_XS.gguf"   # single file
#     filename   = "*.gguf"                       # all quants
#     models_dir = "./models"
# -------------------------------------------------------------------
# repo_id    = "unsloth/Qwen3.5-0.8B-GGUF"
# filename   = "*.gguf"
# models_dir = "./models"

# -------------------------------------------------------------------
# runner_type (optional — default: "llama-bench")
#   Which benchmark backend to use.  Built-in options:
#     • "llama-bench"    — raw throughput (tok/s) via llama.cpp's llama-bench
#     • "llama-server"   — real-world UX latency (TTFT / ITL) via llama-server
# -------------------------------------------------------------------
# runner_type = "llama-bench"

# -------------------------------------------------------------------
# results (optional)
#   Where to write benchmark results. When omitted, an auto-generated
#   filename is used: <config_stem>_YYYYMMDD_HHMM.jsonl
#   The --results CLI flag always takes priority over this value.
# -------------------------------------------------------------------
# results = "results/my_benchmark.jsonl"


# ===================================================================
# [vram-cliff]  — binary-search for the maximum safe context window
# ===================================================================
# Omit this section entirely if you don't need the vram-cliff step.

[vram-cliff]

# min_ctx / max_ctx: search bounds (defaults shown)
# min_ctx = 2048
# max_ctx = 131072

# tolerance: stop when hi − lo < tolerance (default: 1024)
# tolerance = 1024


# ===================================================================
# [sweep]  — declarative parameter sweep
# ===================================================================

[sweep]

# -------------------------------------------------------------------
# n_ctx (required)
#   List of prompt token counts to benchmark.
#   Passed to llama-bench as -p (--n-prompt), which drives the KV cache
#   allocation — larger values test how throughput degrades at longer
#   contexts.
#
#   Typical values:
#     Small  :  2048  4096
#     Medium :  8192  16384
#     Large  :  32768 65536 131072
# -------------------------------------------------------------------
n_ctx = [8192, 16384, 32768]

# -------------------------------------------------------------------
# n_batch (required)
#   List of prompt-processing batch sizes to test.
#   Higher values speed up ingestion but consume more VRAM.
#
#   Typical values: 256, 512, 1024
# -------------------------------------------------------------------
n_batch = [512, 1024]

# -------------------------------------------------------------------
# concurrent_users (optional — default: [1])
#   List of concurrent user counts to test.
#   Added to the Cartesian product: models × n_ctx × n_batch × users.
#   Only meaningful for the "llama-server" runner; ignored by llama-bench.
#   Any positive integers are accepted — there is no hard upper limit.
#
#   Examples:
#     concurrent_users = [1]                   # single user (default)
#     concurrent_users = [1, 2, 4, 8, 16, 32]  # measure latency under load
# -------------------------------------------------------------------
# concurrent_users = [1, 2, 4, 8, 16, 32]

# -------------------------------------------------------------------
# min_ctx_per_slot (optional — default: 512)
#   Minimum context tokens per parallel slot.  When llama-server runs
#   with --parallel N, total n_ctx is divided among N slots.  Combos
#   where n_ctx / concurrent_users < this value are automatically
#   skipped — they'd only produce HTTP 400 errors because prompts
#   wouldn't fit in a slot.  Set to 0 to disable this safety check.
# -------------------------------------------------------------------
# min_ctx_per_slot = 512

# -------------------------------------------------------------------
# [sweep.runner_params] (optional)
#   Runner-specific overrides.  For llama-bench:
#     llama_bench_cmd = "/path/to/llama-bench"   # override binary path
# -------------------------------------------------------------------
# [sweep.runner_params]
# llama_bench_cmd = "llama-bench"
#
# -------------------------------------------------------------------
# Multi-GPU parameters (optional — omit to use defaults)
#
# These map directly to llama.cpp CLI flags and apply to ALL runners
# (llama-bench, llama-server, llama-server-loadtest).
#
# n_gpu_layers
#   Number of model layers to offload to GPU.
#   -1 offloads all layers (default when omitted).
#   Set to a positive integer to split layers between CPU and GPU.
#   Maps to: -ngl <n>
#
# tensor_split
#   Comma-separated GPU weight ratios for multi-GPU setups.
#   Values are relative — "1,1" splits equally, "3,1" puts 75% on GPU 0.
#   Omit for single-GPU machines.
#   Maps to: --tensor-split <s>
#
# split_mode
#   How tensors are distributed across multiple GPUs.
#     "none"  — use only the main GPU
#     "layer" — split layers across GPUs (default when tensor_split is set)
#     "row"   — split rows across GPUs (experimental)
#   Maps to: --split-mode <m>
#
# main_gpu
#   Index of the primary GPU (0-based). Default: 0.
#   On heterogeneous setups, use the GPU with the most VRAM.
#   Maps to: --main-gpu <i>
#
# Example — dual identical GPUs with equal split:
#   tensor_split = "1,1"
#   split_mode   = "layer"
#
# Example — heterogeneous GPUs (24 GB + 8 GB), more weight on GPU 0:
#   tensor_split = "3,1"
#   split_mode   = "layer"
#   main_gpu     = 0
# -------------------------------------------------------------------


# ===================================================================
# llama-server example (real-world UX latency benchmarks)
# ===================================================================
#
# To benchmark with llama-server instead of llama-bench, uncomment the
# runner_type line above (set it to "llama-server") and uncomment the
# runner_params block below.  The default ShareGPT conversational dataset
# (~700 MB) is downloaded automatically on the first run, or you can
# pre-fetch it with:  ppb download-dataset
#
# Use dataset_repo / dataset_filename to swap in a different HF dataset.
# Use shuffle = true so repeated runs draw prompts in a different order.
#
# [sweep.runner_params]
# num_prompts        = 10        # prompts per benchmark run
# n_predict          = 256       # max tokens to generate per prompt
# health_timeout     = 120       # seconds to wait for server readiness
# llama_server_cmd   = "llama-server"   # path or name of the binary
# dataset_dir        = "datasets/data"  # where to cache the dataset
# dataset_repo       = "anon8231489123/ShareGPT_Vicuna_unfiltered"
# dataset_filename   = "ShareGPT_V3_unfiltered_cleaned_split.json"
# shuffle            = false     # randomise prompt order
# seed               = 42       # RNG seed for reproducible shuffling
# stop_timeout       = 30       # seconds to wait for SIGTERM before SIGKILL


# ===================================================================
# llama-server-loadtest example (auto-discover max concurrent users)
# ===================================================================
#
# The loadtest runner escalates concurrent users (1, 2, 4, 8, …) against
# a single server instance and reports the max sustainable user count plus
# the full concurrency curve.
#
# runner_type = "llama-server-loadtest"
#
# [sweep.runner_params]
# max_users          = 64        # highest concurrency level to try
# user_steps         = [1, 2, 4, 8, 16, 32]  # explicit levels (optional)
# error_threshold    = 0.1       # stop when > 10 % prompts fail
# ramp_delay_s       = 1.0       # pause between levels
# num_prompts        = 5         # prompts per user per level
# n_predict          = 256       # max tokens per prompt
# prompt_distribution = "shared" # "shared" or "split"


# ===================================================================
# [publish]  — auto-publish results to the PPB Hugging Face leaderboard
# ===================================================================
#
# When present, `ppb all` will automatically flatten your results to a
# local CSV after the sweep completes.  Set upload = true to also push
# them to the central PPB dataset (paulplee/ppb-results) on Hugging Face
# — "shoot and forget" benchmarking to leaderboard.
#
# Set upload = false (or omit it) to write the CSV without pushing to
# Hugging Face.  You can always upload later with:
#   uv run ppb.py publish results/my_results.jsonl --upload
#
# Authentication:  set HF_TOKEN in your .env file (recommended),
# or run `huggingface-cli login` once.  Do NOT put tokens in this file.
#
# [publish]
# submitter = "Your Name"       # display name for the leaderboard
# upload    = true              # push to HF (default: true for ppb all)
